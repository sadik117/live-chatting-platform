version: '3.9'

services:
  redis:
    image: redis:7-alpine
    container_name: chat_redis
    restart: unless-stopped
    networks:
      - chat_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: chat_server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - PORT=5000
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
    networks:
      - chat_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    container_name: chat_client
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
    depends_on:
      - server
    networks:
      - chat_network

  nginx:
    image: nginx:alpine
    container_name: chat_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - client
      - server
    networks:
      - chat_network

networks:
  chat_network:
    driver: bridge
